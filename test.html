<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Mutation Score</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card h2 {
            margin-top: 0;
            color: #34495e;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        /* Stile dei contatori circolari (Gauges) */
        .gauge-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 20px auto;
        }
        .gauge {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Il gradiente viene aggiornato da JS */
            background: conic-gradient(#3498db 0%, #e0e0e0 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .gauge-inner {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Stile degli Slider */
        .controls {
            text-align: left;
            margin-top: 30px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .controls label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        .controls input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        
        /* Stile del testo di feedback */
        .status {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }
        
        /* Box Informativo */
        .info-box {
            background: #e8f4f8;
            border-left: 5px solid #3498db;
            padding: 20px;
            border-radius: 4px;
            margin-top: 40px;
            line-height: 1.6;
        }
        .info-box h3 { margin-top: 0; color: #2980b9; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎛️ Simulatore Interattivo: Mutmut vs Cosmic Ray</h1>
    
    <div class="grid">
        <div class="card" id="mutmut-card">
            <h2>👾 Mutmut</h2>
            
            <div class="gauge-container">
                <div class="gauge" id="mutmut-gauge">
                    <div class="gauge-inner" id="mutmut-score-text">0%</div>
                </div>
            </div>
            
            <div class="status" id="mutmut-status">Valutazione in corso...</div>

            <div class="controls">
                <div class="control-group">
                    <label><span>Mutanti Totali Generati:</span> <span id="mutmut-total-val">100</span></label>
                    <input type="range" id="mutmut-total" min="1" max="200" value="100">
                </div>
                <div class="control-group">
                    <label><span>Mutanti Uccisi (Killed):</span> <span id="mutmut-killed-val">65</span></label>
                    <input type="range" id="mutmut-killed" min="0" max="100" value="65">
                </div>
            </div>
        </div>

        <div class="card" id="cr-card">
            <h2>🚀 Cosmic Ray</h2>
            
            <div class="gauge-container">
                <div class="gauge" id="cr-gauge">
                    <div class="gauge-inner" id="cr-score-text">0%</div>
                </div>
            </div>
            
            <div class="status" id="cr-status">Valutazione in corso...</div>

            <div class="controls">
                <div class="control-group">
                    <label><span>Job (Mutazioni) Totali:</span> <span id="cr-total-val">119</span></label>
                    <input type="range" id="cr-total" min="1" max="200" value="119">
                </div>
                <div class="control-group">
                    <label><span>Job Uccisi (Non Sopravvissuti):</span> <span id="cr-killed-val">85</span></label>
                    <input type="range" id="cr-killed" min="0" max="119" value="85">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Funzione principale per aggiornare logica e grafica
    function updateDashboard(prefix) {
        const totalSlider = document.getElementById(`${prefix}-total`);
        const killedSlider = document.getElementById(`${prefix}-killed`);
        
        // Assicurati che i killed non superino mai il totale
        killedSlider.max = totalSlider.value;
        if (parseInt(killedSlider.value) > parseInt(totalSlider.value)) {
            killedSlider.value = totalSlider.value;
        }

        const total = parseInt(totalSlider.value);
        const killed = parseInt(killedSlider.value);
        
        // Calcolo Percentuale
        const score = total > 0 ? ((killed / total) * 100).toFixed(1) : 0;

        // Aggiorna i testi dei valori
        document.getElementById(`${prefix}-total-val`).innerText = total;
        document.getElementById(`${prefix}-killed-val`).innerText = killed;
        document.getElementById(`${prefix}-score-text`).innerText = `${score}%`;

        // Aggiorna il cerchio grafico (conic-gradient)
        let color = "#e74c3c"; // Rosso (Debole)
        let statusText = "❌ Suite di test debole";
        let bgColor = "#fadbd8";

        if (score >= 80) {
            color = "#2ecc71"; // Verde (Robusta)
            statusText = "✅ Suite di test robusta";
            bgColor = "#d5f5e3";
        } else if (score >= 50) {
            color = "#f39c12"; // Arancione (Discreta)
            statusText = "⚠️ Suite di test discreta";
            bgColor = "#fcf3cf";
        }

        document.getElementById(`${prefix}-gauge`).style.background = `conic-gradient(${color} ${score}%, #e0e0e0 ${score}%)`;
        
        const statusDiv = document.getElementById(`${prefix}-status`);
        statusDiv.innerText = statusText;
        statusDiv.style.color = color;
        statusDiv.style.backgroundColor = bgColor;
    }

    // Event Listeners per Mutmut
    document.getElementById('mutmut-total').addEventListener('input', () => updateDashboard('mutmut'));
    document.getElementById('mutmut-killed').addEventListener('input', () => updateDashboard('mutmut'));

    // Event Listeners per Cosmic Ray
    document.getElementById('cr-total').addEventListener('input', () => updateDashboard('cr'));
    document.getElementById('cr-killed').addEventListener('input', () => updateDashboard('cr'));

    // Inizializzazione al caricamento
    updateDashboard('mutmut');
    updateDashboard('cr');
</script>

</body>
</html>
