name: Benchmark Mutation Testing

# 1. Quando deve attivarsi il robot? Ad ogni push sul branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  esegui-test:
    # 2. Sistema operativo del server
    runs-on: ubuntu-latest

    steps:
    # 3. Scarica il codice dal tuo repository
    - name: Checkout del codice
      uses: actions/checkout@v4

    # 4. Prepara Python 3.12 (la versione che stai usando)
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 5. Installa Pynguin, Mutmut, Cosmic Ray e pytest
    - name: Installazione Dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 6. Avvia il tuo script Python
    - name: Esecuzione del Benchmark
      env:
        CI: "true" # Questa è la variabile che dice allo script di fare solo 2 run!
      run: python benchmark_runner.py

    # 7. Salva la cartella "results" e te la fa scaricare
    - name: Salvataggio Dashboard e Report
      uses: actions/upload-artifact@v4
      if: always() # Salva i file anche se qualche test fallisce
      with:
        name: benchmark-results
        path: results/
